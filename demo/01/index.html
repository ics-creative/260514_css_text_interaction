<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>1. ::selection疑似要素のデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .compare {
      display: grid;
      gap: 12px;
    }

    .demo {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 8px;
      background: #f3f4f6;
    }

    .article {
      padding: 16px;
      border-radius: 8px;
      background: #88c9ea;
      color: #243b62;
    }

    .code-block {
      overflow: auto;
      padding: 16px;
      border-radius: 8px;
      font-size: 0.86rem;
      line-height: 1.7;
      white-space: pre;
      background: #111827;
      color: #cbd5e1;
    }

    .good .article::selection {
      background-color: #ffd5b3;
      color: #1a1a1a;
    }

    .good .code-block::selection {
      /* コードブロックでは暗い文字色と相性のよい黄色にする */
      background-color: #fde68a;
      color: #111827;
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="compare">
    <div class="demo bad">
      <p class="article">選択範囲の色が背景に近いと、コピーしたい範囲を認識しづらい</p>
      <pre class="code-block"><code>const text = "選択範囲の色が文字色に近いと、コピーしたい範囲を認識しづらい";
console.log(text);</code></pre>
    </div>

    <div class="demo good">
      <p class="article">選択範囲の色が背景色とかぶらない例</p>
      <pre class="code-block"><code>const text = "選択範囲の色が文字色とかぶらない例";
console.log(text);</code></pre>
    </div>
  </div>
</div>
</body>
</html>
