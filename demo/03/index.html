<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>3. -webkit-tap-highlight-colorプロパティのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .wrapper {
      width: min(720px, calc(100% - 32px));
    }

    .compare {
      /* 上はタップハイライトなし、下は薄いハイライトを残す */
      display: grid;
      gap: 12px;
    }

    .tap-group {
      display: grid;
      gap: 10px;
      place-items: center;
      padding: 16px;
      border-radius: 8px;
      background: #f5f3ff;
    }

    .notice,
    .control-item {
      /* 操作文と英訳を中央にそろえて、デモの比較を見やすくする */
      display: grid;
      justify-items: center;
      text-align: center;
    }

    .tap-group a,
    .tap-group button {
      width: fit-content;
      max-width: 100%;
    }

    .tap-group a {
      color: #3223b3;
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .tap-group button {
      min-width: 220px;
      padding: 12px 18px;
      border: 1px solid #c8c1fb;
      border-radius: 8px;
      color: #3223b3;
      background: #ffffff;
      box-shadow: 0 1px 2px rgb(50 35 179 / 0.12);
    }

    .bad a,
    .bad button {
      /* 透明にすると、モバイルでタップできた手がかりが弱くなる */
      -webkit-tap-highlight-color: transparent;
    }

    .good a,
    .good button {
      /* 明るい面にハイライトを重ねて、タップできた手がかりを見えやすくする */
      -webkit-tap-highlight-color: rgb(50 35 179 / 0.32);
    }

    .tap-group a:active {
      color: #21136f;
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="notice">
    <p>※スマートフォンでご確認ください</p>
    <p class="translation" lang="en">Please check this on a smartphone.</p>
  </div>
  <div class="compare">
    <div class="tap-group bad">
      <div class="control-item">
        <a href="#bad-link">リンクをタップする</a>
        <p class="translation" lang="en">Tap the link.</p>
      </div>
      <div class="control-item">
        <button type="button">項目をタップする</button>
        <p class="translation" lang="en">Tap the item.</p>
      </div>
    </div>

    <div class="tap-group good">
      <div class="control-item">
        <a href="#good-link">リンクをタップする</a>
        <p class="translation" lang="en">Tap the link.</p>
      </div>
      <div class="control-item">
        <button type="button">項目をタップする</button>
        <p class="translation" lang="en">Tap the item.</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
