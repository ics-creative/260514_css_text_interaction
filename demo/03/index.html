<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>3. -webkit-tap-highlight-colorプロパティのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .wrapper {
      width: min(720px, calc(100% - 32px));
    }

    .compare {
      /* 上はタップハイライトなし、下は薄いハイライトを残す */
      display: grid;
      gap: 12px;
    }

    .tap-group {
      display: grid;
      gap: 10px;
      place-items: center;
      padding: 16px;
      border-radius: 8px;
      background: #f3f4f6;
    }

    .notice,
    .control-item {
      /* 操作文と英訳を中央にそろえて、デモの比較を見やすくする */
      display: grid;
      justify-items: center;
      text-align: center;
    }

    .quiet-link,
    .tap-card {
      width: fit-content;
      max-width: 100%;
    }

    .quiet-link {
      color: #0f5f8f;
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .tap-card {
      min-width: 220px;
      padding: 12px 18px;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      color: #1e3a8a;
      background: #ffffff;
      box-shadow: 0 1px 2px rgb(15 23 42 / 0.08);
    }

    .bad a,
    .bad button {
      /* 透明にすると、モバイルでタップできた手がかりが弱くなる */
      -webkit-tap-highlight-color: transparent;
    }

    .good a,
    .good button {
      /* タップできた手がかりを残しつつ、画面になじむ濃さにする */
      -webkit-tap-highlight-color: rgb(14 165 233 / 0.22);
    }

    .good .tap-card {
      /* 明るい面にハイライトを重ねて、タップできた手がかりを見えやすくする */
      -webkit-tap-highlight-color: rgb(37 99 235 / 0.32);
    }

    .good .quiet-link {
      /* テキストリンクでは主張を弱め、読み心地を崩さない */
      -webkit-tap-highlight-color: rgb(15 23 42 / 0.12);
    }

    .quiet-link:active {
      /* リンク自体のフィードバックは控えめにして、タップハイライトとの差を見やすくする */
      color: #164e63;
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="notice">
    <p>※スマートフォンでご確認ください</p>
    <p class="translation" lang="en">Please check this on a smartphone.</p>
  </div>
  <div class="compare">
    <div class="tap-group bad">
      <div class="control-item">
        <a class="quiet-link" href="#bad-link">リンクをタップする</a>
        <p class="translation" lang="en">Tap the link.</p>
      </div>
      <div class="control-item">
        <button class="tap-card" type="button">項目をタップする</button>
        <p class="translation" lang="en">Tap the item.</p>
      </div>
    </div>

    <div class="tap-group good">
      <div class="control-item">
        <a class="quiet-link" href="#good-link">リンクをタップする</a>
        <p class="translation" lang="en">Tap the link.</p>
      </div>
      <div class="control-item">
        <button class="tap-card" type="button">項目をタップする</button>
        <p class="translation" lang="en">Tap the item.</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
