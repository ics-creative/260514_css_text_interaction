<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>3. -webkit-tap-highlight-colorプロパティのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .compare {
      display: grid;
      gap: 12px;
    }

    .tap-group {
      display: grid;
      gap: 10px;
      place-items: center;
      padding: 16px;
      border-radius: 8px;
      background: #f5f3ff;

      a {
        color: #3223b3;
        text-decoration: underline;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;

        &:active {
          color: #21136f;
        }
      }

      button {
        min-width: 220px;
        padding: 12px 18px;
        border: 1px solid #9185ef;
        border-radius: 8px;
        color: #3223b3;
        background: #ffffff;
        box-shadow: 0 1px 2px rgb(50 35 179 / 0.12);
      }

      a,
      button {
        /* 長押し時にテキスト選択の黒いハイライトが出ないようにする */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
    }

    .notice,
    .control-item {
      display: grid;
      justify-items: center;
      text-align: center;
    }

    .bad {
      a,
      button {
        /* 悪い例：透明にすると、モバイルでタップできた手がかりが弱くなる */
        -webkit-tap-highlight-color: transparent;
      }
    }

    .good {
      a,
      button {
        /* 良い例：ハイライトを重ねて、タップできた手がかりを見えやすくする */
        -webkit-tap-highlight-color: rgb(50 35 179 / 0.32);
      }
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="notice">
    <p>※スマートフォンでご確認ください</p>
    <p class="translation" lang="en">Please check this on a smartphone.</p>
  </div>
  <div class="compare">
    <div class="tap-group bad">
      <div class="control-item">
        <a href="#bad-link">リンクをタップする</a>
        <p class="translation" lang="en">Tap the link.</p>
      </div>
      <div class="control-item">
        <button type="button">項目をタップする</button>
        <p class="translation" lang="en">Tap the item.</p>
      </div>
    </div>

    <div class="tap-group good">
      <div class="control-item">
        <a href="#good-link">リンクをタップする</a>
        <p class="translation" lang="en">Tap the link.</p>
      </div>
      <div class="control-item">
        <button type="button">項目をタップする</button>
        <p class="translation" lang="en">Tap the item.</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
