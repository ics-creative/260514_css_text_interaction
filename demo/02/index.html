<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>2. caret-colorプロパティのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .wrapper {
      width: min(800px, calc(100% - 32px));
    }

    .compare {
      /* 上は背景に近いキャレット、下はアクセントカラーのキャレットにする */
      display: grid;
      gap: 12px;
    }

    .form {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 8px;
      background: #111827;
    }

    label,
    .editable-field {
      display: grid;
      gap: 6px;
      font-size: 0.94rem;
      color: #d8e3f0;
    }

    input,
    textarea,
    .editable-note {
      width: 100%;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      font: inherit;
      color: #e5eefb;
      background: #111827;
      outline: none;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    .editable-note {
      min-height: 78px;
    }

    input:focus,
    textarea:focus,
    .editable-note:focus {
      /* フォーカスしている入力欄は枠線でも状態を伝える */
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgb(14 165 233 / 0.18);
    }

    .bad input,
    .bad textarea,
    .bad .editable-note {
      /* 背景に近いキャレット色だと、入力位置を見つけにくい */
      caret-color: #111827;
    }

    .good input,
    .good textarea,
    .good .editable-note {
      /* 入力位置を見つけやすいよう、UIのアクセントカラーを使う */
      caret-color: #0ea5e9;
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="compare">
    <div class="form bad">
      <label>
        検索キーワード
        <input value="キャレットの色" />
      </label>
      <label>
        メモ
        <textarea>キャレットが見えないと、入力位置が分かりにくくなります。</textarea>
      </label>
      <div class="editable-field">
        編集できる本文
        <p class="editable-note" contenteditable="true">入力位置を確認しながら本文を編集します。</p>
      </div>
    </div>

    <div class="form good">
      <label>
        検索キーワード
        <input value="キャレットの色" />
      </label>
      <label>
        メモ
        <textarea>キャレットが見えないと、入力位置が分かりにくくなります。</textarea>
      </label>
      <div class="editable-field">
        編集できる本文
        <p class="editable-note" contenteditable="true">入力位置を確認しながら本文を編集します。</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
