<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>2. caret-colorプロパティのデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .compare {
      /* 上は背景に近いキャレット、下はアクセントカラーのキャレットにする */
      display: grid;
      gap: 12px;
    }

    .form {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 8px;
      background: var(--theme-primary-dark);
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.94rem;
      color: var(--theme-tooltip-bg);
    }

    textarea {
      width: 100%;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid rgb(var(--theme-secondary-rgb) / 0.48);
      border-radius: 8px;
      font: inherit;
      color: #ffffff;
      background: #180f52;
      outline: none;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    textarea:focus {
      border-color: var(--theme-secondary);
      box-shadow: 0 0 0 3px rgb(var(--theme-secondary-rgb) / 0.24);
    }

    .bad textarea {
      /* キャレットが透明だと、入力位置を見つけにくい */
      caret-color: transparent;
    }

    .bad2 textarea {
      /* 背景に近いキャレット色だと、入力位置を見つけにくい */
      caret-color: #24146f;
    }

    .good textarea{
      /* 入力位置を見つけやすいよう、明るい色を使う */
      caret-color: var(--theme-secondary);
    }

    .form .translation {
      color: var(--theme-tooltip-bg);
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="compare">
    <div class="form bad">
      <label>
        <span>
          😢️ キャレットが透明
          <span class="translation" lang="en">The caret is transparent.</span>
        </span>
        <textarea>キャレットが見えないと、入力位置が分かりにくくなります。この文章は編集できます。</textarea>
      </label>
    </div>

    <div class="form bad2">
      <label>
        <span>
          😢️ キャレットが背景色と近い
          <span class="translation" lang="en">The caret color is close to the background color.</span>
        </span>
        <textarea>キャレットが見えないと、入力位置が分かりにくくなります。この文章は編集できます。</textarea>
      </label>
    </div>

    <div class="form good">
      <label>
        <span>
          ☺️ キャレットが見やすい
          <span class="translation" lang="en">The caret is easy to see.</span>
        </span>
        <textarea>キャレットが見えないと、入力位置が分かりにくくなります。この文章は編集できます。</textarea>
      </label>
    </div>
  </div>
</div>
</body>
</html>
